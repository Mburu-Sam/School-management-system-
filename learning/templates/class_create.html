{% extends 'base.html' %}

{% block title %}Create Class{% endblock %}

{% block content %}
<div class="panel form-card">
    <h2>Create Class</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            {% for field in form %}
            <div class="form-row full">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                <small style="color:#ef476f;">{{ field.errors|striptags }}</small>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <div style="margin-top: 16px; display:flex; gap:12px;">
            <button type="submit" class="btn btn-primary">Save Class</button>
            <a href="{% url 'class_list' %}" class="btn btn-secondary">View Classes</a>
        </div>
    </form>
</div>
{% endblock %}
