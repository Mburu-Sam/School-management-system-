{% extends 'base.html' %}

{% block title %}Create Assignment{% endblock %}

{% block content %}
<div class="panel form-card" style="max-width:520px; margin:40px auto;">
    <h2>Create Assignment</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-grid">
            {% for field in form %}
            <div class="form-row full">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                <small style="color:#ef476f;">{{ field.errors|striptags }}</small>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <div style="margin-top:16px;">
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Assignment</button>
        </div>
    </form>
</div>
{% endblock %}
