{% extends 'base.html' %}

{% block title %}Grades{% endblock %}

{% block content %}
<div class="panel table-card">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px;">
        <h2>Gradebook</h2>
        <a href="{% url 'grade_create' %}" class="btn btn-primary">Add Grade</a>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Class</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody>
                {% for grade in grades %}
                <tr>
                    <td>{{ grade.student }}</td>
                    <td>{{ grade.class_obj }}</td>
                    <td>{{ grade.grade }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3">No grades recorded.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
